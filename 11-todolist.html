<head>
    " content="width=device-width, initial-scale=1.0">
    <title>To Do list</title>
</head>

<body>
    <p>To do list Pratice 1</p>
    <input type="text" placeholder="Enter your task here" class="inputText">
    <button onclick="addToList()">Add</button>
    <script>
        let todoList = [];
        function addToList() {
            let input = document.querySelector(".inputText");
            console.log(input);
            let task = input.value;
            if (task) {
                todoList.push(task);
                console.log(todoList);
                input.textContent = "";
                input.value = "";
            }
            input.textContent = "";
        }
    </script>
</body>

</html>
